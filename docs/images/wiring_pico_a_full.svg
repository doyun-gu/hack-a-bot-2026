<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <style>
      .title { font-size: 22px; font-weight: bold; fill: #1a1a2e; }
      .subtitle { font-size: 12px; fill: #666; }
      .pin-label { font-size: 10px; fill: #fff; font-weight: bold; text-anchor: middle; }
      .mod-title { font-size: 13px; font-weight: bold; fill: #fff; text-anchor: middle; }
      .mod-sub { font-size: 9px; fill: #bbb; text-anchor: middle; }
      .wire-label { font-size: 8px; font-weight: bold; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="#f8f9fa" rx="12"/>
  <text x="550" y="32" class="title" text-anchor="middle">Pico A — Grid Controller — Full Wiring</text>
  <text x="550" y="48" class="subtitle" text-anchor="middle">All connections from Pico A to peripherals</text>

  <!-- ==================== PICO A (CENTER) ==================== -->
  <rect x="380" y="70" width="240" height="580" rx="14" fill="#1a1a2e" stroke="#2d2d5e" stroke-width="2"/>
  <rect x="380" y="70" width="240" height="36" rx="14" fill="#16213e"/>
  <rect x="380" y="92" width="240" height="14" fill="#16213e"/>
  <text x="500" y="94" class="mod-title">Pico 2 — Grid Controller</text>

  <!-- USB -->
  <rect x="470" y="58" width="60" height="16" rx="4" fill="#555" stroke="#777"/>
  <text x="500" y="70" font-size="7" fill="#aaa" text-anchor="middle">USB</text>

  <!-- LEFT PINS -->
  <!-- GP0 -->
  <rect x="385" y="120" width="44" height="20" rx="3" fill="#e67e22"/>
  <text x="407" y="134" class="pin-label">GP0</text>
  <!-- GP1 -->
  <rect x="385" y="144" width="44" height="20" rx="3" fill="#e67e22"/>
  <text x="407" y="158" class="pin-label">GP1</text>
  <!-- GND -->
  <rect x="385" y="168" width="44" height="20" rx="3" fill="#34495e"/>
  <text x="407" y="182" class="pin-label">GND</text>
  <!-- GP2 -->
  <rect x="385" y="192" width="44" height="20" rx="3" fill="#3498db"/>
  <text x="407" y="206" class="pin-label">GP2</text>
  <!-- GP3 -->
  <rect x="385" y="216" width="44" height="20" rx="3" fill="#3498db"/>
  <text x="407" y="230" class="pin-label">GP3</text>
  <!-- GP4 -->
  <rect x="385" y="240" width="44" height="20" rx="3" fill="#1abc9c"/>
  <text x="407" y="254" class="pin-label">GP4</text>
  <!-- GP5 -->
  <rect x="385" y="264" width="44" height="20" rx="3" fill="#1abc9c"/>
  <text x="407" y="278" class="pin-label">GP5</text>
  <!-- GND -->
  <rect x="385" y="288" width="44" height="20" rx="3" fill="#34495e"/>
  <text x="407" y="302" class="pin-label">GND</text>
  <!-- GP10 -->
  <rect x="385" y="360" width="44" height="20" rx="3" fill="#f39c12"/>
  <text x="407" y="374" class="pin-label">GP10</text>
  <!-- GP11 -->
  <rect x="385" y="384" width="44" height="20" rx="3" fill="#f39c12"/>
  <text x="407" y="398" class="pin-label">GP11</text>
  <!-- GP12 -->
  <rect x="385" y="408" width="44" height="20" rx="3" fill="#f39c12"/>
  <text x="407" y="422" class="pin-label">GP12</text>
  <!-- GP13 -->
  <rect x="385" y="432" width="44" height="20" rx="3" fill="#f39c12"/>
  <text x="407" y="446" class="pin-label">GP13</text>
  <!-- GP14 -->
  <rect x="385" y="480" width="44" height="20" rx="3" fill="#e74c3c"/>
  <text x="407" y="494" class="pin-label">GP14</text>
  <!-- GP15 -->
  <rect x="385" y="504" width="44" height="20" rx="3" fill="#27ae60"/>
  <text x="407" y="518" class="pin-label">GP15</text>

  <!-- RIGHT PINS -->
  <!-- 3V3 -->
  <rect x="571" y="120" width="44" height="20" rx="3" fill="#e74c3c"/>
  <text x="593" y="134" class="pin-label">3V3</text>
  <!-- VSYS -->
  <rect x="571" y="144" width="44" height="20" rx="3" fill="#c0392b"/>
  <text x="593" y="158" class="pin-label">VSYS</text>
  <!-- GND -->
  <rect x="571" y="168" width="44" height="20" rx="3" fill="#34495e"/>
  <text x="593" y="182" class="pin-label">GND</text>
  <!-- GP16 -->
  <rect x="571" y="360" width="44" height="20" rx="3" fill="#9b59b6"/>
  <text x="593" y="374" class="pin-label">GP16</text>
  <!-- GP26 -->
  <rect x="571" y="456" width="44" height="20" rx="3" fill="#2ecc71"/>
  <text x="593" y="470" class="pin-label">GP26</text>
  <!-- GP27 -->
  <rect x="571" y="480" width="44" height="20" rx="3" fill="#2ecc71"/>
  <text x="593" y="494" class="pin-label">GP27</text>
  <!-- GP28 -->
  <rect x="571" y="504" width="44" height="20" rx="3" fill="#2ecc71"/>
  <text x="593" y="518" class="pin-label">GP28</text>
  <!-- GND bottom right -->
  <rect x="571" y="600" width="44" height="20" rx="3" fill="#34495e"/>
  <text x="593" y="614" class="pin-label">GND</text>

  <!-- ==================== nRF24L01+ (TOP LEFT) ==================== -->
  <rect x="40" y="80" width="200" height="140" rx="10" fill="#2d2d5e" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="102" class="mod-title">nRF24L01+ PA+LNA</text>
  <text x="140" y="116" class="mod-sub">SPI0 — 2.4GHz Wireless</text>

  <!-- nRF pin list -->
  <text x="60" y="136" font-size="9" fill="#e67e22">CE  ← GP0</text>
  <text x="60" y="150" font-size="9" fill="#e67e22">CSN ← GP1</text>
  <text x="60" y="164" font-size="9" fill="#3498db">SCK ← GP2</text>
  <text x="60" y="178" font-size="9" fill="#3498db">MOSI← GP3</text>
  <text x="60" y="192" font-size="9" fill="#9b59b6">MISO← GP16</text>
  <text x="150" y="136" font-size="9" fill="#e74c3c">VCC ← 3V3</text>
  <text x="150" y="150" font-size="9" fill="#888">GND ← GND</text>
  <text x="150" y="164" font-size="9" fill="#888">IRQ = NC</text>

  <!-- Capacitor note -->
  <rect x="60" y="200" width="80" height="16" rx="3" fill="#ffc107"/>
  <text x="100" y="212" font-size="8" fill="#333" text-anchor="middle" font-weight="bold">+ 10µF Cap</text>

  <!-- Wires from Pico left to nRF -->
  <line x1="385" y1="130" x2="240" y2="130" stroke="#e67e22" stroke-width="2.5"/>
  <line x1="385" y1="154" x2="240" y2="148" stroke="#d35400" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="385" y1="202" x2="240" y2="162" stroke="#3498db" stroke-width="2.5"/>
  <line x1="385" y1="226" x2="240" y2="176" stroke="#2980b9" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- GP16 on right side wraps around top -->
  <path d="M615,370 L660,370 L660,60 L130,60 L130,80" fill="none" stroke="#9b59b6" stroke-width="2.5"/>
  <!-- 3V3 -->
  <path d="M615,130 L650,130 L650,70 L220,70 L220,80" fill="none" stroke="#e74c3c" stroke-width="2.5"/>

  <!-- ==================== BMI160 IMU (LEFT MIDDLE) ==================== -->
  <rect x="40" y="280" width="200" height="100" rx="10" fill="#0d7377" stroke="#0a5c5e" stroke-width="1.5"/>
  <text x="140" y="302" class="mod-title">BMI160 IMU</text>
  <text x="140" y="316" class="mod-sub">I2C0 — Addr 0x68 — 6-axis</text>
  <text x="60" y="336" font-size="9" fill="#1abc9c">SDA ← GP4</text>
  <text x="60" y="350" font-size="9" fill="#1abc9c">SCL ← GP5</text>
  <text x="60" y="364" font-size="9" fill="#e74c3c">VCC ← 3V3</text>
  <text x="150" y="336" font-size="9" fill="#888">GND ← GND</text>
  <text x="150" y="350" font-size="9" fill="#aaa" font-style="italic">4.7kΩ pull-ups</text>

  <!-- I2C wires -->
  <line x1="385" y1="250" x2="240" y2="332" stroke="#1abc9c" stroke-width="2.5"/>
  <line x1="385" y1="274" x2="240" y2="346" stroke="#16a085" stroke-width="2.5" stroke-dasharray="6,3"/>

  <!-- ==================== PCA9685 (LEFT BOTTOM) ==================== -->
  <rect x="40" y="400" width="200" height="120" rx="10" fill="#6c3483" stroke="#5b2c6f" stroke-width="1.5"/>
  <text x="140" y="422" class="mod-title">PCA9685</text>
  <text x="140" y="436" class="mod-sub">I2C0 — Addr 0x40 — 16-ch PWM</text>
  <text x="60" y="456" font-size="9" fill="#1abc9c">SDA ← GP4 (shared)</text>
  <text x="60" y="470" font-size="9" fill="#1abc9c">SCL ← GP5 (shared)</text>
  <text x="60" y="484" font-size="9" fill="#e74c3c">VCC ← 5V bus</text>
  <text x="60" y="498" font-size="9" fill="#888">GND ← GND</text>
  <text x="60" y="508" font-size="9" fill="#d7bde2">CH0 → Servo 1 (valve)</text>
  <text x="60" y="518" font-size="9" fill="#d7bde2">CH1 → Servo 2 (gate)</text>

  <!-- I2C shared bus line -->
  <path d="M310,250 L310,340 L310,452 L240,452" fill="none" stroke="#1abc9c" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ==================== MOSFET SWITCHES (RIGHT TOP) ==================== -->
  <rect x="760" y="280" width="280" height="180" rx="10" fill="#7d6608" stroke="#665407" stroke-width="1.5"/>
  <text x="900" y="302" class="mod-title">MOSFET Power Switches</text>
  <text x="900" y="316" class="mod-sub">GPIO → 1kΩ → Gate — N-Channel</text>

  <text x="780" y="340" font-size="10" fill="#f39c12" font-weight="bold">GP10 → Motor 1 (fan/pump)</text>
  <text x="780" y="358" font-size="10" fill="#f39c12" font-weight="bold">GP11 → Motor 2 (conveyor)</text>
  <text x="780" y="376" font-size="10" fill="#f39c12" font-weight="bold">GP12 → LED bank load</text>
  <text x="780" y="394" font-size="10" fill="#f39c12" font-weight="bold">GP13 → Recycle path</text>

  <text x="780" y="420" font-size="9" fill="#d4ac0d">Each: GPIO → 1kΩ → MOSFET gate</text>
  <text x="780" y="434" font-size="9" fill="#d4ac0d">Motor return → 1Ω sense R → drain</text>
  <text x="780" y="448" font-size="9" fill="#d4ac0d">Source → GND</text>

  <!-- Wires to MOSFETs -->
  <line x1="429" y1="370" x2="760" y2="336" stroke="#f39c12" stroke-width="2"/>
  <line x1="429" y1="394" x2="760" y2="354" stroke="#f39c12" stroke-width="2"/>
  <line x1="429" y1="418" x2="760" y2="372" stroke="#f39c12" stroke-width="2"/>
  <line x1="429" y1="442" x2="760" y2="390" stroke="#f39c12" stroke-width="2"/>

  <!-- ==================== ADC SENSORS (RIGHT BOTTOM) ==================== -->
  <rect x="760" y="480" width="280" height="120" rx="10" fill="#1e8449" stroke="#196f3d" stroke-width="1.5"/>
  <text x="900" y="502" class="mod-title">Analog Sensors (ADC)</text>
  <text x="900" y="516" class="mod-sub">0-3.3V input — 12-bit resolution</text>

  <text x="780" y="540" font-size="10" fill="#2ecc71" font-weight="bold">GP26 → Bus voltage (10k+10k divider)</text>
  <text x="780" y="558" font-size="10" fill="#2ecc71" font-weight="bold">GP27 → Motor 1 current (1Ω sense)</text>
  <text x="780" y="576" font-size="10" fill="#2ecc71" font-weight="bold">GP28 → Motor 2 current (1Ω sense)</text>
  <text x="780" y="594" font-size="9" fill="#82e0aa">V_bus = ADC × 2 (divider ratio)</text>

  <!-- ADC wires -->
  <line x1="615" y1="466" x2="760" y2="536" stroke="#2ecc71" stroke-width="2"/>
  <line x1="615" y1="490" x2="760" y2="554" stroke="#2ecc71" stroke-width="2"/>
  <line x1="615" y1="514" x2="760" y2="572" stroke="#2ecc71" stroke-width="2"/>

  <!-- ==================== STATUS LEDs (BOTTOM LEFT) ==================== -->
  <rect x="40" y="545" width="200" height="70" rx="10" fill="#555" stroke="#444" stroke-width="1.5"/>
  <text x="140" y="567" class="mod-title">Status LEDs</text>

  <!-- Red LED -->
  <circle cx="80" cy="590" r="8" fill="#e74c3c" opacity="0.8"/>
  <text x="95" y="594" font-size="9" fill="#eee">GP14 → 330Ω → Red</text>
  <!-- Green LED -->
  <circle cx="80" cy="606" r="8" fill="#27ae60" opacity="0.8"/>
  <text x="95" y="610" font-size="9" fill="#eee">GP15 → 330Ω → Green</text>

  <!-- LED wires -->
  <line x1="385" y1="490" x2="240" y2="586" stroke="#e74c3c" stroke-width="2"/>
  <line x1="385" y1="514" x2="240" y2="602" stroke="#27ae60" stroke-width="2"/>

  <!-- ==================== POWER SUPPLY (RIGHT CORNER) ==================== -->
  <rect x="760" y="80" width="280" height="160" rx="10" fill="#922b21" stroke="#7b241c" stroke-width="1.5"/>
  <text x="900" y="102" class="mod-title">Power Supply</text>
  <text x="900" y="118" class="mod-sub">12V 6A PSU → Buck Converters</text>

  <text x="780" y="142" font-size="10" fill="#f1948a" font-weight="bold">12V PSU → LM2596S Buck → 5V</text>
  <text x="780" y="160" font-size="10" fill="#f1948a" font-weight="bold">12V PSU → Buck-Boost → Motors</text>
  <text x="780" y="182" font-size="10" fill="#fadbd8">5V → Pico VSYS (pin 39)</text>
  <text x="780" y="198" font-size="10" fill="#fadbd8">5V → PCA9685, Servos</text>
  <text x="780" y="214" font-size="10" fill="#fadbd8">3.3V from Pico → nRF, BMI160</text>
  <text x="780" y="230" font-size="9" fill="#e6b0aa" font-style="italic">Motor voltage: adjustable via buck-boost</text>

  <!-- VSYS wire -->
  <line x1="615" y1="154" x2="760" y2="178" stroke="#c0392b" stroke-width="2.5"/>

  <!-- ==================== LEGEND ==================== -->
  <rect x="40" y="700" width="1020" height="40" rx="6" fill="#eef" stroke="#dde"/>
  <rect x="60" y="712" width="14" height="10" rx="2" fill="#e67e22"/>
  <text x="80" y="722" font-size="9" fill="#333">nRF Control</text>
  <rect x="150" y="712" width="14" height="10" rx="2" fill="#3498db"/>
  <text x="170" y="722" font-size="9" fill="#333">SPI</text>
  <rect x="210" y="712" width="14" height="10" rx="2" fill="#1abc9c"/>
  <text x="230" y="722" font-size="9" fill="#333">I2C</text>
  <rect x="270" y="712" width="14" height="10" rx="2" fill="#f39c12"/>
  <text x="290" y="722" font-size="9" fill="#333">MOSFET Switch</text>
  <rect x="380" y="712" width="14" height="10" rx="2" fill="#2ecc71"/>
  <text x="400" y="722" font-size="9" fill="#333">ADC Sensor</text>
  <rect x="470" y="712" width="14" height="10" rx="2" fill="#e74c3c"/>
  <text x="490" y="722" font-size="9" fill="#333">Power</text>
  <rect x="530" y="712" width="14" height="10" rx="2" fill="#9b59b6"/>
  <text x="550" y="722" font-size="9" fill="#333">MISO Return</text>

  <text x="700" y="722" font-size="9" fill="#666" font-style="italic">Solid line = signal | Dashed = alternate/shared</text>
</svg>